version: '3.8'
services:
  ssh-test:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: devops-ssh-test
    ports:
      - "2222:2222"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - USER_NAME=devops
      - USER_PASSWORD=devops123
      - SUDO_ACCESS=true
      - PASSWORD_ACCESS=true
    restart: unless-stopped